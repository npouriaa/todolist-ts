<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + TS</title>
  </head>
  <body>
    <div class="purple-section"></div>
    <div class="container">
      <header>
        <h1>Todo App Typescript</h1>
      </header>
      <main>
        <form class="add-todo">
          <button type="submit" class="add-btn">+</button>
          <input
            placeholder="Create a new todo"
            class="add-input"
            type="text"
          />
          <button class="clear-btn">Clear</button>
        </form>
        <div class="todos-con">
          <h1>Todos</h1>
          <ul>
            <li>
              <div class="checkbox-con">
                <input class="checkbox" id="check" type="checkbox" />
                <span></span>
              </div>
              <div class="todo-text">dssdsd;sd</div>
              <button class="remove-todo-btn">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="w-6 h-6"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6 18L18 6M6 6l12 12"
                  />
                </svg>
              </button>
            </li>
          </ul>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
